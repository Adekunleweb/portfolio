<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>

    <div class="container">

        <h1>🌤 Weather App</h1>

        <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button id="searchBtn">Search</button>
</div>

<button id="locationBtn">📍 Use My Location</button>

<p id="errorMessage"></p>

<p id="errorMessage"></p>

        <div class="weather-box">

    <img id="weatherIcon" src="" alt="Weather Icon">

    <h2 id="city">City</h2>

    <h1 id="temperature">--°C</h1>

    <p id="description">Weather Description</p>

    <p id="feelsLike">Feels Like: --°C</p>

<p id="humidity">Humidity: --%</p>

<p id="wind">Wind: -- km/h</p>
<p id="pressure">Pressure: -- hPa</p>

<p id="visibility">Visibility: -- km</p>
<p id="sunrise">Sunrise: --</p>
<p id="sunset">Sunset: --</p>
</div>

    </div>

    <script src="script.js"></script>

</body>
</html>
